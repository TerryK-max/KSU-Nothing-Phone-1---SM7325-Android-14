name: Build KernelSU (Nothing Phone 1 - SM7325)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: 🧹 Nettoyage de l'espace disque
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 🛠️ Installation des dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl wget git zip unzip

      - name: 📥 Téléchargement de Proton-Clang (Compilateur)
        run: |
          # On utilise Proton-Clang, le standard communautaire pour compiler les noyaux Android
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git ~/proton-clang

      - name: 📥 Téléchargement du noyau Nothing Phone 1
        run: |
          # Dépôt officiel Nothing OSS pour le Phone 1 (SM7325) - Branche Android 14 (U)
          git clone --depth=1 https://github.com/NothingOSS/android_kernel_msm-5.4_nothing_sm7325.git -b sm7325/u/mr android-kernel

      - name: 💉 Injection de KernelSU
        run: |
          cd android-kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: 🏗️ Compilation du Kernel
        run: |
          cd android-kernel
          export PATH="$HOME/proton-clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64

          # --- 1. PATCHS QUALCOMM (Comme avant) ---
          sed -i 's/static inline int cpu_boost_init(void) { }/static inline int cpu_boost_init(void) { return 0; }/g' kernel/sched/walt/walt.h
          sed -i '1i extern unsigned long nohz_flags(int cpu);' kernel/sched/walt/qc_vas.c
          sed -i '1i #define NOHZ_KICK_MASK 0x1' kernel/sched/walt/qc_vas.c
          sed -i 's/usb_qdss_alloc_req(ch, USB_BUF_NUM)/usb_qdss_alloc_req(ch, USB_BUF_NUM, USB_BUF_NUM)/g' drivers/hwtracing/coresight/coresight-byte-cntr.c

          # --- 2. PATCH KERNELSU (MÉTHODE BULLETPROOF) ---
          # On cherche le dossier qui contient REELLEMENT les headers de KernelSU
          KSU_HEADER_DIR=$(find . -name "app_profile.h" -exec dirname {} + | head -n 1)
          echo "🔍 Dossier des headers KSU trouvé : $KSU_HEADER_DIR"

          if [ -z "$KSU_HEADER_DIR" ]; then
            echo "❌ Erreur : Impossible de localiser les fichiers KernelSU !"
            exit 1
          fi

          # On injecte tout dans include/linux (Le dossier maître des headers)
          cp "$KSU_HEADER_DIR"/*.h include/linux/

          # On crée aussi un dossier uapi factice là où le compilateur râlait
          mkdir -p drivers/kernelsu/uapi
          cp "$KSU_HEADER_DIR"/*.h drivers/kernelsu/uapi/
          
          mkdir -p drivers/kernelsu/core/uapi
          cp "$KSU_HEADER_DIR"/*.h drivers/kernelsu/core/uapi/

          # On transforme les chemins d'inclusion pour qu'ils pointent vers include/linux
          grep -rl 'include "uapi/' drivers/kernelsu | xargs sed -i 's|include "uapi/|include <linux/|g' || true

          # --- 3. PRÉPARATION DE LA CONFIGURATION ---
          mkdir -p out
          cat arch/arm64/configs/gki_defconfig arch/arm64/configs/vendor/lahaina_QGKI.config > arch/arm64/configs/nothing_defconfig
          make O=out nothing_defconfig

          # --- 4. COMPILATION ---
          make -j$(nproc) O=out \
                      CC=clang \
                      LD=ld.lld \
                      AR=llvm-ar \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip \
                      OBJSIZE=llvm-size \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LLVM=1 \
                      LLVM_IAS=1 \
                      KCFLAGS="-Wno-error -Wno-return-type -Wno-implicit-function-declaration -Wno-align-mismatch -fno-stack-protector"

      - name: 📦 Création du fichier ZIP flashable (AnyKernel3)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          # On désactive la vérification stricte du nom de l'appareil pour éviter les erreurs de flash
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          
          # On copie le noyau compilé (Image) dans le dossier AnyKernel
          cp ../android-kernel/out/arch/arm64/boot/Image .
          zip -r9 ../KernelSU-NothingPhone1.zip *

      - name: 🚀 Upload du ZIP final
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-NothingPhone1-Flashable
          path: KernelSU-NothingPhone1.zip
